<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestion des Étudiants</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: radial-gradient(circle at center, #6B1E23 0%, #2C0F12 100%);
      background-attachment: fixed;
    }
  </style>
</head>
<body class="p-6">

  <div class="max-w-6xl mx-auto">

    <h1 class="text-3xl font-bold text-center mb-6 text-[#DBC5A1]">Gestion des Étudiants</h1>

    <div class="grid grid-cols-2 gap-4 mb-6 text-[#E3DAC9]">
      <div class="bg-white/10 backdrop-blur-md rounded-xl shadow-xl p-4 border border-white/20">
        <p class="text-sm opacity-70">👴 Plus âgé</p>
        <p id="plusAge" class="font-bold mt-1">—</p>
      </div>
      <div class="bg-white/10 backdrop-blur-md rounded-xl shadow-xl p-4 border border-white/20">
        <p class="text-sm opacity-70">🏆 Meilleure moyenne</p>
        <p id="meilleureAvg" class="font-bold mt-1">—</p>
      </div>
    </div>

    <div class="flex items-center justify-between mb-4 gap-4">
      <input
        type="text"
        id="recherche"
        placeholder="Rechercher par nom ou prénom..."
        class="w-full bg-white/5 border border-white/10 rounded-lg p-2 text-white placeholder-[#DBC5A1]/40 focus:outline-none focus:ring-2 focus:ring-[#DBC5A1]/30"
      />
      <button
        onclick="ouvrirModalAjouter()"
        class="bg-[#1E0A0C] text-white px-4 py-2 rounded-lg whitespace-nowrap hover:bg-[#2C0F12] transition border border-white/10 shadow-lg"
      >
        ➕ Ajouter
      </button>
    </div>

    <div class="bg-black/20 backdrop-blur-lg rounded-xl shadow-2xl border border-white/10 overflow-hidden">
      <table class="w-full text-sm text-[#E3DAC9]">
        <thead class="bg-black/40 text-[#DBC5A1]">
          <tr>
            <th class="p-3 text-left">Prénom</th>
            <th class="p-3 text-left">Nom</th>
            <th class="p-3 text-left">Âge</th>
            <th class="p-3 text-left">Moyenne</th>
            <th class="p-3 text-left">Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody" class="divide-y divide-white/5"></tbody>
      </table>
    </div>

    <div id="pagination" class="flex justify-center gap-2 mt-4"></div>

  </div>

  <div id="modalForm" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-[#2C0F12] border border-white/10 rounded-2xl shadow-2xl w-full max-w-md p-6 text-white">
      <h2 id="modalFormTitre" class="text-xl font-bold mb-4 text-[#DBC5A1]">Ajouter un étudiant</h2>
      <form id="formEtudiant" class="space-y-3">
        <div>
          <label class="block text-sm font-medium text-[#DBC5A1]/60">Prénom</label>
          <input type="text" id="champPrenom" class="w-full bg-black/20 border border-white/10 rounded-lg p-2 mt-1 focus:outline-none focus:ring-2 focus:ring-[#DBC5A1]/40" required />
        </div>
        <div>
          <label class="block text-sm font-medium text-[#DBC5A1]/60">Nom</label>
          <input type="text" id="champNom" class="w-full bg-black/20 border border-white/10 rounded-lg p-2 mt-1 focus:outline-none focus:ring-2 focus:ring-[#DBC5A1]/40" required />
        </div>
        <div>
          <label class="block text-sm font-medium text-[#DBC5A1]/60">Âge</label>
          <input type="number" id="champAge" class="w-full bg-black/20 border border-white/10 rounded-lg p-2 mt-1 focus:outline-none focus:ring-2 focus:ring-[#DBC5A1]/40" required />
        </div>
        <div>
          <label class="block text-sm font-medium text-[#DBC5A1]/60">Moyenne</label>
          <input type="number" step="0.01" id="champMoyenne" class="w-full bg-black/20 border border-white/10 rounded-lg p-2 mt-1 focus:outline-none focus:ring-2 focus:ring-[#DBC5A1]/40" required />
        </div>
        <div class="flex justify-end gap-3 pt-2">
          <button type="button" onclick="fermerModalForm()" class="px-4 py-2 rounded-lg border border-white/10 text-[#DBC5A1]/60 hover:text-white">Annuler</button>
          <button type="submit" class="px-4 py-2 rounded-lg bg-[#DBC5A1] text-[#2C0F12] font-bold hover:bg-white transition">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <div id="modalDetails" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-[#2C0F12] border border-white/10 rounded-2xl shadow-2xl w-full max-w-md p-6 text-white">
      <h2 class="text-xl font-bold mb-4 text-green-400">Détails de l'étudiant</h2>
      <div class="space-y-3">
        <div>
          <label class="block text-sm font-medium text-[#DBC5A1]/60">Prénom</label>
          <p id="detailPrenom" class="border border-white/5 rounded-lg p-2 mt-1 bg-black/20 text-[#E3DAC9]"></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-[#DBC5A1]/60">Nom</label>
          <p id="detailNom" class="border border-white/5 rounded-lg p-2 mt-1 bg-black/20 text-[#E3DAC9]"></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-[#DBC5A1]/60">Âge</label>
          <p id="detailAge" class="border border-white/5 rounded-lg p-2 mt-1 bg-black/20 text-[#E3DAC9]"></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-[#DBC5A1]/60">Moyenne</label>
          <p id="detailMoyenne" class="border border-white/5 rounded-lg p-2 mt-1 bg-black/20 text-[#E3DAC9]"></p>
        </div>
      </div>
      <div class="flex justify-end pt-4">
        <button onclick="fermerModalDetails()" class="px-4 py-2 rounded-lg border border-white/10 text-gray-400 hover:text-white">Fermer</button>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
